spring.application.name=CitizenGrievance
###############################################################################
# DATABASE CONFIGURATION (Relational - MySQL)
###############################################################################
# The JDBC connection URL for the database (e.g., jdbc:mysql://localhost:3306/mydb)
spring.datasource.url=${DB_URL}
# Database connection username
spring.datasource.username=${DB_USERNAME}
# Database connection password
spring.datasource.password=${DB_PASSWORD}

###############################################################################
# JPA / HIBERNATE CONFIGURATION
###############################################################################
# Controls database schema generation. 'update' automatically modifies the schema based on Entity classes
spring.jpa.hibernate.ddl-auto=update
# Set to 'true' to log all executed SQL queries to the console (disabled by default for cleaner logs)
spring.jpa.show-sql=false
# Pretty-prints the logged SQL queries so they are easier to read
spring.jpa.properties.hibernate.format_sql=true
# Specifies the SQL dialect so Hibernate can optimize queries for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

###############################################################################
# EMAIL SERVICE CONFIGURATION (Gmail SMTP)
###############################################################################
# The hostname of the SMTP server
spring.mail.host=smtp.gmail.com
# The port for TLS/STARTTLS connection (587 is standard for Gmail)
spring.mail.port=587
# Your email address (or Gmail App Username)
spring.mail.username=${MAIL_USERNAME}
# Your email password (It is highly recommended to use a Gmail 'App Password' here)
spring.mail.password=${MAIL_PASSWORD}
# Enables user authentication for sending emails
spring.mail.properties.mail.smtp.auth=true
# Enables TLS encryption to secure the email communication channel
spring.mail.properties.mail.smtp.starttls.enable=true

###############################################################################
# DATABASE CONFIGURATION (NoSQL - MongoDB)
###############################################################################
# Host address of the MongoDB server (e.g., localhost or a cluster URI)
spring.data.mongodb.host=${MONGO_HOST}
# Port number for the MongoDB server (default is 27017)
spring.data.mongodb.port=${MONGO_PORT}
# The name of the specific MongoDB database to connect to
spring.data.mongodb.database=${MONGO_DB}

###############################################################################
# FILE UPLOAD CONFIGURATION (Multipart Requests)
###############################################################################
# Maximum file size allowed for any single uploaded file
spring.servlet.multipart.max-file-size=50MB
# Maximum total request size allowed (useful if uploading multiple files simultaneously)
spring.servlet.multipart.max-request-size=50MB