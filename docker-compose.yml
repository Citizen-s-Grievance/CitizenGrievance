version: '3.8'

services:

  # ===== MySQL Database =====
  mysql:
    image: mysql:8.0
    container_name: cgms-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cgms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== MongoDB Database =====
  mongodb:
    image: mongo:6.0
    container_name: cgms-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cgms-network

  # ===== Spring Boot Backend =====
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: cgms-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - cgms-network

  # ===== React Frontend =====
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: cgms-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cgms-network

  # ===== Python AI Worker =====
  ai_module:
    build:
      context: .
      dockerfile: ai_module.Dockerfile
    container_name: cgms-ai-worker
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      LLM_TUNNEL_URL: ${LLM_TUNNEL_URL}
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - cgms-network

networks:
  cgms-network:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
